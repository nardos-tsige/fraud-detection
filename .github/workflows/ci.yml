name: Continuous Integration

on:
  push:
    branches: [ main, master ]

jobs:
  check-structure:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check repository structure only
      run: |
        echo "========================================="
        echo "Checking repository structure"
        echo "========================================="
        
        # Check required files
        required_files="README.md requirements.txt .gitignore"
        for file in $required_files; do
          if [ -f "$file" ]; then
            echo " $file exists"
          else
            echo " $file missing"
            exit 1
          fi
        done
        
        # Check directories - REMOVED data/processed from this list
        required_dirs="notebooks models data data/raw reports"
        for dir in $required_dirs; do
          if [ -d "$dir" ]; then
            echo " $dir exists"
          else
            echo " $dir missing"
            exit 1
          fi
        done
        
        # Check notebooks
        notebook_count=$(ls -1 notebooks/*.ipynb 2>/dev/null | wc -l)
        echo "Found $notebook_count notebooks"
        if [ $notebook_count -lt 4 ]; then
          echo " Need at least 4 notebooks"
          exit 1
        fi
        echo " Notebook count OK"
        
        # Check model
        if [ -f "models/best_fraud_model.pkl" ]; then
          echo " Model file exists"
        else
          echo " Model file missing"
          exit 1
        fi
        
        # Check SHAP plots
        plot_count=$(ls -1 reports/*.png 2>/dev/null | wc -l)
        echo "Found $plot_count images in reports"
        if [ $plot_count -lt 2 ]; then
          echo " Need at least 2 SHAP plots"
          exit 1
        fi
        echo " SHAP plots OK"
        
        echo ""
        echo "========================================="
        echo "All checks passed! Repository is valid."
        echo "========================================="
    
    - name: Validate notebook JSON
      run: |
        echo "Validating notebook JSON syntax..."
        sudo apt-get update -qq
        sudo apt-get install -y jq
        
        for nb in notebooks/*.ipynb; do
          if jq empty "$nb" 2>/dev/null; then
            echo " $nb is valid"
          else
            echo " $nb has invalid JSON"
            exit 1
          fi
        done
        echo "All notebooks are valid JSON!"